; polybar config — ArchDroid (proot-distro + Termux:X11)
; Nord theme, responsivo

[colors]
nord0 = #2E3440
nord1 = #3B4252
nord2 = #434C5E
nord3 = #4C566A
nord4 = #D8DEE9
nord5 = #E5E9F0
nord6 = #ECEFF4
nord7 = #8FBCBB
nord8 = #88C0D0
nord9 = #81A1C1
nord10 = #5E81AC
nord11 = #BF616A
nord12 = #D08770
nord13 = #EBCB8B
nord14 = #A3BE8C
nord15 = #B48EAD

background = ${colors.nord0}
background-alt = ${colors.nord1}
foreground = ${colors.nord4}
foreground-alt = ${colors.nord9}
primary = ${colors.nord8}
secondary = ${colors.nord7}
alert = ${colors.nord11}
disabled = ${colors.nord3}

[bar/main]
width = 100%
height = 28
offset-x = 0
offset-y = 0
radius = 0
background = ${colors.nord0}
foreground = ${colors.nord4}

border-size = 0

padding-left = 8
padding-right = 8

module-margin-left = 2
module-margin-right = 2

font-0 = "Noto Sans:size=10;2"
font-1 = "Noto Sans CJK:size=10;2"
font-2 = "Noto Color Emoji:size=10;2"

modules-left = i3
modules-center =
modules-right = date

cursor-click = pointer
scroll-up = i3wm-wsnext
scroll-down = i3wm-wsprev

wm-restack = bspwm
override-redirect = false

; ── Modules ──

[module/i3]
type = internal/i3
format = <label-state> <label-mode>
index-sort = true
wrapping-scroll = false

label-focused = %index%
label-focused-background = ${colors.nord2}
label-focused-foreground = ${colors.nord8}
label-focused-padding = 2
label-focused-underline = ${colors.nord8}
label-focused-overline =

label-unfocused = %index%
label-unfocused-foreground = ${colors.nord4}
label-unfocused-padding = 2

label-visible = %index%
label-visible-foreground = ${colors.nord9}
label-visible-padding = 2
label-visible-underline = ${colors.nord9}

label-urgent = %index%
label-urgent-background = ${colors.nord11}
label-urgent-foreground = ${colors.nord6}
label-urgent-padding = 2

label-separator =
separator =

[module/date]
type = internal/date
internal = 5
date = %d/%m
date-alt = %A, %d %B %Y
time = %H:%M
time-alt = %H:%M:%S
format = <label>
format-background =
format-foreground = ${colors.nord9}
format-padding = 4
label = %date%  %time%
