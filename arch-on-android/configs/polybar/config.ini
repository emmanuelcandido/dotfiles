; polybar config — ArchDroid
; Adapted from remfly/dotfiles (Nord theme) for i3

[nord]
background = #3B4252
foreground = #D8DEE9
secondary-background = #4C566A
selection-background = #4C566A
selection-foreground = #A8ACB3

text = #D9DEE9
hightlight = #434C5E
links = #8FBCBB
transparent = #00000000

red = #BF616A
orange = #D08770
yellow = #EBCB8B
green = #A3BE8C
blue = #5E81AC
cyan = #88C0D0
magenta = #B48EAD

focused = ${nord.cyan}
normal = ${nord.text}

[bar/main]
width = 100%
height = 30
offset-x = 0%
offset-y = 0%
radius = 0
fixed-center = true

background = ${nord.background}
foreground = ${nord.text}

line-size = 2
line-color = ${nord.text}

border-size = 0
border-color = ${nord.transparent}

padding-left = 0
padding-right = 0

module-margin-left = 0
module-margin-right = 0

font-0 = "Symbols Nerd Font:size=10;2"
font-1 = "Symbols Nerd Font:size=11;2"
font-2 = "Symbols Nerd Font:size=12;3"
font-3 = "Symbols Nerd Font:size=13;3"
font-4 = "Symbols Nerd Font:size=14;2"
font-5 = "Roboto:size=10:weight=medium;2"
font-6 = "Roboto:size=11:weight=medium;2"
font-7 = "Source Code Pro for Powerline:size=19;5"

modules-left = icon i3-arrow i3 menu-arrow window window-arrow
modules-center =
modules-right = info-arrow cpu memory updates tray-arrow date

tray-position = right
tray-padding = 3
tray-scale = 1
tray-detached = false
tray-offset-x = 0
tray-offset-y = 0
tray-background = ${nord.secondary-background}

cursor-click = pointer
cursor-scroll = pointer

[module/icon]
type = custom/text
content = "      "
content-foreground = ${nord.text}
content-background = ${nord.secondary-background}
content-font = 4
click-left = rofi -show drun -show-icons

[module/i3]
type = internal/i3
pin-workspaces = true
inline-mode = false
enable-click = true
enable-scroll = true
reverse-scroll = true

format = <label-state> <label-mode>
format-background = ${nord.secondary-background}
format-font = 4

label-focused = %name%
label-focused-foreground = ${nord.text}
label-focused-underline = ${nord.text}
label-focused-padding = 3

label-occupied = %name%
label-occupied-foreground = ${nord.selection-foreground}
label-occupied-padding = 3

label-urgent = "%name%!"
label-urgent-background = ${nord.red}
label-urgent-padding = 3

label-empty = %name%
label-empty-foreground = ${nord.text}
label-empty-padding = 3

[module/window]
type = internal/xwindow
format = <label>
format-foreground = ${nord.text}
format-background = ${nord.secondary-background}
format-padding = 1
label = "    %title%   "
label-empty = "    Desktop   "
label-maxlen = 55
label-font = 6

[module/i3-arrow]
type = custom/text
content = ""
content-foreground = ${nord.secondary-background}
content-background = ${nord.background}
content-font = 8

[module/menu-arrow]
type = custom/text
content = ""
content-foreground = ${nord.background}
content-background = ${nord.secondary-background}
content-font = 8

[module/window-arrow]
type = custom/text
content = ""
content-foreground = ${nord.secondary-background}
content-background = ${nord.background}
content-font = 8

[module/info-arrow]
type = custom/text
content = ""
content-background = ${nord.background}
content-foreground = ${nord.secondary-background}
content-font = 8

[module/tray-arrow]
type = custom/text
content = ""
content-foreground = ${nord.secondary-background}
content-background = ${nord.background}
content-font = 8

[module/cpu]
type = internal/cpu
interval = 0.5
format-prefix = "  ﬙  "
format-prefix-foreground = ${nord.text}
format-prefix-background = ${nord.background}
format-prefix-font = 3
label = "CPU: %percentage:2%% "
label-foreground = ${nord.text}
label-background = ${nord.background}
label-font = 5

[module/memory]
type = internal/memory
interval = 0.5
format-prefix = "    "
format-prefix-foreground = ${nord.text}
format-prefix-background = ${nord.background}
format-prefix-font = 4
label = "MEM: %percentage_used%% "
label-foreground = ${nord.text}
label-background = ${nord.background}
label-font = 5

[module/updates]
type = custom/script
exec = ~/.config/polybar/scripts/updates.sh
interval = 700
format = <label>
format-prefix = "ﮮ "
format-prefix-font = 1
format-prefix-foreground = ${nord.text}
format-prefix-background = ${nord.background}
label = "%output%    "
label-foreground = ${nord.text}
label-background = ${nord.background}
label-font = 6

[module/date]
type = internal/date
interval = 1
time = " %H:%M "
label = %time%
label-font = 6
format = <label>
format-foreground = ${nord.text}
format-background = ${nord.secondary-background}
format-prefix = "   "
format-prefix-foreground = ${nord.text}
format-prefix-background = ${nord.secondary-background}
format-prefix-font = 4

[settings]
screenchange-reload = true
