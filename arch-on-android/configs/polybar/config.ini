; polybar config — ArchDroid i3
; Minimal, workspaces | title | info

[nord]
background = #3B4252
foreground = #D8DEE9
secondary-background = #4C566A
selection-background = #4C566A
selection-foreground = #A8ACB3

text = #D9DEE9
hightlight = #434C5E
links = #8FBCBB
transparent = #00000000

red = #BF616A
orange = #D08770
yellow = #EBCB8B
green = #A3BE8C
cyan = #88C0D0
magenta = #B48EAD

focused = ${nord.cyan}
normal = ${nord.text}

[bar/main]
width = 100%
height = 30
offset-x = 0%
offset-y = 5
radius = 8
fixed-center = true

background = ${nord.background}
foreground = ${nord.text}

line-size = 2
line-color = ${nord.text}

border-size = 0
border-color = ${nord.transparent}

padding-left = 12
padding-right = 12

module-margin-left = 2
module-margin-right = 2

font-0 = "Symbols Nerd Font:size=10;2"
font-1 = "Roboto:size=9:weight=medium;2"

modules-left = i3
modules-center = window
modules-right = notifications wifi bluetooth tray pulseaudio time date week

tray-position = right
tray-padding = 2
tray-scale = 1
tray-background = ${nord.secondary-background}

cursor-click = pointer
cursor-scroll = pointer

[module/i3]
type = internal/i3

pin-workspaces = true
enable-click = true
enable-scroll = true
reverse-scroll = true
label-focused = %name%
label-focused-foreground = ${nord.focused}
label-focused-underline = ${nord.cyan}
label-focused-padding = 2

label-occupied = %name%
label-occupied-foreground = ${nord.selection-foreground}
label-occupied-padding = 2

label-urgent = %name%
label-urgent-foreground = ${nord.text}
label-urgent-background = ${nord.red}
label-urgent-padding = 2

label-empty =
label-empty-foreground = ${nord.transparent}
label-empty-padding = 0

label-separator =
label-separator-padding = 0

[module/window]
type = internal/xwindow

label = "%title%"
label-foreground = ${nord.text}
label-maxlen = 60
label-font = 1

[module/week]
type = internal/date
interval = 60
date = %a
label = "   %date%  "
label-foreground = ${nord.text}
label-font = 1

[module/date]
type = internal/date
interval = 60
date = %d/%m
label = "   %date%  "
label-foreground = ${nord.text}
label-font = 1

[module/time]
type = internal/date
interval = 1
time = %H:%M
label = "   %time%  "
label-foreground = ${nord.text}
label-font = 1

[module/pulseaudio]
type = internal/pulseaudio

format-volume = <ramp-volume> <label-volume>
format-volume-foreground = ${nord.text}

label-volume = "%percentage%%"
label-volume-font = 1

ramp-volume-0 = "  "
ramp-volume-1 = "  "
ramp-volume-2 = "  "

format-muted = "  0%"
format-muted-foreground = ${nord.text}

[module/bluetooth]
type = custom/script
exec = echo ""
exec-if = command -v bluetoothctl && bluetoothctl show | grep -q "Powered: yes"
click-left = blueman-manager 2>/dev/null || gnome-control-center bluetooth 2>/dev/null || echo
interval = 30
label = %output%
label-foreground = ${nord.text}
label-font = 0

[module/wifi]
type = custom/script
exec = echo ""
exec-if = command -v iwgetid && iwgetid >/dev/null 2>&1
click-left = nm-connection-editor 2>/dev/null || echo
interval = 30
label = %output%
label-foreground = ${nord.text}
label-font = 0

[module/notifications]
type = custom/script
exec = echo ""
click-left = dunstctl history-pop 2>/dev/null || echo
click-right = dunstctl context 2>/dev/null || echo
interval = 60
label = %output%
label-foreground = ${nord.text}
label-font = 0

[settings]
screenchange-reload = true

[global/wm]
margin-top = 0
margin-bottom = 0

; vim:ft=dosini
