; polybar — ArchDroid i3
; Caixas (pill) com ícone + valor dentro de cada container
; [ws] [— titulo —] [ temporais ] [volume] [bt wifi] [notif] [tray]

[nord]
background = #3B4252
foreground = #D8DEE9
secondary-background = #4C566A
selection-background = #4C566A
selection-foreground = #A8ACB3

text = #D9DEE9
hightlight = #434C5E
links = #8FBCBB
transparent = #00000000

red = #BF616A
orange = #D08770
yellow = #EBCB8B
green = #A3BE8C
cyan = #88C0D0
magenta = #B48EAD

[bar/main]
width = 100%
height = 28
offset-y = 4
fixed-center = true

background = ${nord.background}
foreground = ${nord.text}

line-size = 2

border-size = 0
border-color = ${nord.transparent}

padding-left = 6
padding-right = 6

module-margin-left = 2
module-margin-right = 2

font-0 = "Symbols Nerd Font:size=10;2"
font-1 = "Roboto:size=9:weight=medium;2"

modules-left = i3
modules-center = window
; centro → direita: notificacoes | volume | wifi | temporais
modules-right = notifications sep pulseaudio wifi sep time month date week

tray-position = right
tray-padding = 2
tray-scale = 1
tray-background = ${nord.secondary-background}

cursor-click = pointer
cursor-scroll = pointer

[module/sep]
type = custom/text
content = "  "

[module/i3]
type = internal/i3

pin-workspaces = true
enable-click = true
enable-scroll = true
reverse-scroll = true

label-focused = %name%
label-focused-foreground = ${nord.background}
label-focused-background = ${nord.cyan}
label-focused-padding = 2

label-occupied = %name%
label-occupied-foreground = ${nord.text}
label-occupied-background = ${nord.secondary-background}
label-occupied-padding = 2

label-urgent = %name%
label-urgent-foreground = ${nord.text}
label-urgent-background = ${nord.red}
label-urgent-padding = 2

label-empty =
label-empty-padding = 0

label-separator =

[module/window]
type = internal/xwindow

label = "  %title%  "
label-foreground = ${nord.text}
label-maxlen = 60
label-font = 1

[module/week]
type = internal/date
interval = 3600
date = %V
label = "    %date%  "
label-foreground = ${nord.text}
label-background = ${nord.secondary-background}
label-padding = 1
label-font = 1

[module/date]
type = internal/date
interval = 3600
date = %d/%m
label = "    %date%  "
label-foreground = ${nord.text}
label-background = ${nord.secondary-background}
label-padding = 1
label-font = 1

[module/month]
type = internal/date
interval = 3600
date = %B
label = "    %date%  "
label-foreground = ${nord.text}
label-background = ${nord.secondary-background}
label-padding = 1
label-font = 1

[module/time]
type = internal/date
interval = 1
time = %H:%M
label = "    %time%  "
label-foreground = ${nord.text}
label-background = ${nord.secondary-background}
label-padding = 1
label-font = 1

[module/pulseaudio]
type = internal/pulseaudio

format-volume = <ramp-volume> <label-volume>
format-volume-foreground = ${nord.text}
format-volume-background = ${nord.secondary-background}
format-volume-padding = 1

label-volume = "%percentage%%"
label-volume-font = 1

ramp-volume-0 = "   "
ramp-volume-1 = "   "
ramp-volume-2 = "   "

format-muted = "   0%"
format-muted-foreground = ${nord.text}
format-muted-background = ${nord.secondary-background}
format-muted-padding = 1

[module/wifi]
type = custom/script
exec = echo "    "
; iwgetid falha no proot (sem acesso a wireless extensions do kernel)
; fallback: check if any wl* interface exists via sysfs
exec-if = test -d /sys/class/net/wlan0 || test -d /sys/class/net/wlan1
click-left = nm-connection-editor 2>/dev/null || echo
interval = 30
label = %output%
label-foreground = ${nord.text}
label-background = ${nord.secondary-background}
label-padding = 1
label-font = 0

[module/notifications]
type = custom/script
exec = echo "    "
click-left = dunstctl history-pop 2>/dev/null || true
click-right = dunstctl context 2>/dev/null || true
interval = 60
label = %output%
label-foreground = ${nord.text}
label-background = ${nord.secondary-background}
label-padding = 1
label-font = 0

[settings]
screenchange-reload = true

[global/wm]
margin-top = 0
margin-bottom = 0

; vim:ft=dosini
