backend = "xrender";
corner-radius = 8;

# Exclude polybar from rounded corners — bar must be square
rounded-corners-exclude = [
  "class_g = 'polybar'"
];

shadow = true;
shadow-radius = 12;
shadow-opacity = 0.4;

fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;
no-fading-openclose = true;

inactive-opacity = 0.92;
active-opacity = 1.0;

opacity-rule = [
  "100:class_g = 'polybar'",
  "100:class_g = 'rofi'",
  "100:class_g = 'dunst'"
];
