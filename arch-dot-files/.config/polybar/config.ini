; polybar config — i3 + Nord
; Adapted from remfly dotfiles — bspwm → i3, CPU/RAM commented

[nord]
background = #3B4252
foreground = #D8DEE9
secondary-background = #4C566A
selection-background = #4C566A
selection-foreground = #A8ACB3

text = #D9DEE9
hightlight = #434C5E
links = #8FBCBB
transparent = #00000000

red = #BF616A
orange = #D08770
yellow = #EBCB8B
green = #A3BE8C
blue = #5E81AC
cyan = #88C0D0
magenta = #B48EAD

focused = ${nord.cyan}
normal = ${nord.text}

[bar/top]
width = 100%
height = 28
offset-x = 0%
offset-y = 0%
radius = 8
fixed-center = true

background = ${nord.background}
foreground = ${nord.text}

line-size = 2
line-color = ${nord.text}

border-size = 0
border-color = ${nord.transparent}

padding-left = 0
padding-right = 0

module-margin-left = 0
module-margin-right = 0

font-0 = "Symbols Nerd Font:size=9;2"
font-1 = "Symbols Nerd Font:size=10;2"
font-2 = "Symbols Nerd Font:size=11;3"
font-3 = "Symbols Nerd Font:size=12;3"
font-4 = "Symbols Nerd Font:size=13;2"
font-5 = "Roboto:size=9:weight=medium;2"
font-6 = "Roboto:size=10:weight=medium;2"
font-7 = "Source Code Pro for Powerline:size=18;5"

; TWM Reference order: [workspaces] [window-title] [media] [volume] [bluetooth] [wifi] [notifications] [tray] [week-number] [date DD/MM] [clock HH:MM]
modules-left = icon workspace-arrow i3 window-arrow window
modules-right = info-arrow volume bluetooth wifi updates tray-arrow tray date

tray-position = right
tray-padding = 3
tray-scale = 1
tray-detached = false
tray-offset-x = 0
tray-offset-y = 0
tray-background = ${nord.background}

cursor-click = pointer
cursor-scroll = pointer

[module/icon]
type = custom/text

content = "        "
content-foreground = ${nord.text}
content-background = ${nord.secondary-background}
content-font = 4
click-left = rofi -show drun -show-icons

[module/i3]
type = internal/i3

pin-workspaces = true
enable-click = true
enable-scroll = true
reverse-scroll = true
strip-wsnumbers = true

format = <label-state>
format-background = ${nord.secondary-background}
format-font = 4

label-focused = %name%
label-focused-foreground = ${nord.text}
label-focused-background = ${nord.secondary-background}
label-focused-padding = 3

label-occupied = %name%
label-occupied-foreground = ${nord.selection-foreground}
label-occupied-padding = 3

label-urgent = "%name%!"
label-urgent-background = ${nord.red}
label-urgent-padding = 3

label-empty = %name%
label-empty-foreground = ${nord.text}
label-empty-padding = 3

[module/window]
type = internal/xwindow

format = <label>
format-foreground = ${nord.text}
format-background = ${nord.secondary-background}
format-padding = 1
format-prefix = ""
format-prefix-font = 3
format-prefix-padding = 3
format-prefix-foreground = ${nord.text}
format-prefix-background = ${nord.secondary-background}

label = "    %title%   "
label-empty = "    Desktop   "
label-maxlen = 55
label-separator = " "
label-font = 6

[module/volume]
type = internal/alsa

format-volume = <ramp-volume> <label-volume>
format-volume-background = ${nord.background}

label-volume = "  %percentage%%  "
label-volume-foreground = ${nord.text}
label-volume-font = 5

format-muted = "  婢  "
format-muted-background = ${nord.background}
format-muted-foreground = ${nord.red}
format-muted-font = 4

ramp-volume-0 = "   "
ramp-volume-1 = "   "
ramp-volume-2 = "   "

[module/bluetooth]
type = custom/script
exec = ~/.config/polybar/scripts/bluetooth.sh
interval = 5
format-foreground = ${nord.text}
format-background = ${nord.background}
format-font = 4

[module/wifi]
type = internal/network
interface = wlan0
interval = 3.0

format-connected = "<ramp-signal> <label-connected>"
format-connected-background = ${nord.background}

label-connected = "%essid%  "
label-connected-foreground = ${nord.text}
label-connected-font = 5

format-disconnected = ""
;     

ramp-signal-0 = "  "
ramp-signal-1 = "  "
ramp-signal-2 = "  "
ramp-signal-3 = "  "
ramp-signal-4 = "  "
; 

[module/updates]
type = custom/script
exec = ~/.config/polybar/scripts/updates.sh
interval = 700

format = <label>
format-prefix = "ﮮ "
format-prefix-font = 1
format-prefix-padding = 1
format-prefix-foreground = ${nord.text}
format-prefix-background = ${nord.background}

label = "%output%    "
label-foreground = ${nord.text}
label-background = ${nord.background}
label-font = 6

[module/date]
type = internal/date
interval = 1

date = "  %V  %d/%m"
date-alt = "  Week %V  %d/%m/%Y"
time = "  %H:%M  "

label = %date% %time%
label-font = 6

format = <label>
format-foreground = ${nord.text}
format-background = ${nord.secondary-background}

format-prefix = "   "
format-prefix-padding = 1
format-prefix-foreground = ${nord.text}
format-prefix-background = ${nord.secondary-background}
format-prefix-font = 4

click-left = echo $(date +%s | xclip -i -sel cli)

; === ARROW MODULES (NORD POWERLINE) ===
; ── between icon and i3 ──
[module/workspace-arrow]
type = custom/text
content = ""
content-foreground = ${nord.secondary-background}
content-background = ${nord.background}
content-font = 8

; ── between i3 and window ──
[module/window-arrow]
type = custom/text
content = ""
content-foreground = ${nord.background}
content-background = ${nord.secondary-background}
content-font = 8

; ── between window and right modules ──
[module/info-arrow]
type = custom/text
content = ""
content-foreground = ${nord.background}
content-background = ${nord.secondary-background}
content-font = 8

; ── before tray ──
[module/tray-arrow]
type = custom/text
content = ""
content-foreground = ${nord.secondary-background}
content-background = ${nord.background}
content-font = 8

[settings]
screenchange-reload = true

[global/wm]
margin-top = 0
margin-bottom = 0

; vim:ft=dosini
