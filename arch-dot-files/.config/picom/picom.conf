# picom config — Nord, corner-radius 8
# For Android/proot: use backend = "xrender" instead

### Shadows ###
shadow = true;
shadow-radius = 12;
shadow-offset-x = -8;
shadow-offset-y = -8;
shadow-opacity = 0.4;
shadow-color = "#000000";
shadow-exclude = [
  "class_g = 'polybar'",
  "class_g = 'Polybar'",
  "class_g = 'dunst'",
  "class_g = 'Dunst'",
  "class_g = 'rofi'",
  "name = 'Notification'",
  "name = 'Dunst'",
  "class_g = 'slock'"
];

### Fading ###
fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;
fade-delta = 4;
no-fading-openclose = true;
fade-exclude = [
  "class_g = 'polybar'",
  "class_g = 'Polybar'",
  "class_g = 'flameshot'",
  "class_g = 'Flameshot'"
];

### Opacity ###
frame-opacity = 1.0;
inactive-opacity = 0.92;
active-opacity = 1.0;
inactive-opacity-override = false;

opacity-rule = [
  "100:class_g = 'polybar'",
  "100:class_g = 'Polybar'",
  "100:class_g = 'chromium'",
  "100:class_g = 'Chromium'",
  "100:class_g = 'flameshot'",
  "100:class_g = 'Flameshot'",
  "100:class_g = 'rofi'",
  "100:class_g = 'dunst'",
  "100:class_g = 'Dunst'",
  "100:class_g = 'slock'"
];

### Corners ###
corner-radius = 8;
rounded-corners-exclude = [
  "class_g = 'polybar'",
  "class_g = 'Polybar'"
];

### Backend ###
backend = "glx";
vsync = true;

### General ###
unredir-if-possible = false;
log-level = "warn";
detect-client-opacity = true;
detect-transient = true;
detect-client-led = true;
use-damage = false;

wintypes:
{
  normal = { fade = false; shadow = false; }
  tooltip = { fade = false; shadow = false; opacity = 1.0; focus = true; full-shadow = false; };
  dock = { shadow = false; }
  dnd = { shadow = false; }
  popup_menu = { opacity = 1.0; }
  dropdown_menu = { opacity = 1.0; }
};
